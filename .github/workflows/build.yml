name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for release notes git log

      - name: Compute version
        id: version
        run: |
          BASE=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          FULL="${BASE}.${{ github.run_number }}"
          echo "version=$FULL" >> "$GITHUB_OUTPUT"
          echo "Building version: $FULL (base=$BASE, build=${{ github.run_number }})"

      - name: Set up QEMU (for ARM cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{version}}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build release notes from commits
        if: github.ref == 'refs/heads/main'
        id: notes
        run: |
          # Fetch tags created by previous CI runs (lightweight tags on GitHub)
          git fetch --tags --force

          # Find the previous release tag, skipping the one we're about to create
          CURRENT="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(gh release list --limit 10 --exclude-drafts --json tagName \
            -q "[.[] | select(.tagName != \"${CURRENT}\")][0].tagName" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ] && git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          {
            echo "## What's New"
            echo ""
            echo "$COMMITS"
          } > /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md \
            --latest
