# PowerMaster Example Configuration — Site B (Export/VPP Site)
# Plan: Globird ZEROHERO VPP (GLO1063901MRE1)
# Effective: 2026-06-12
# Rates confirmed 2026-06-14, inc GST (no discount)
# Energex/QLD, Australia/Brisbane, all week, monthly billing

# ============================================================================
# Site Configuration
# ============================================================================

battery:
  capacity_wh: 51200              # 51.2 kWh system (larger for peak export)
  max_charge_rate_w: 10000
  max_discharge_rate_w: 10000
  max_grid_import_w: 15000        # Site max grid import threshold
  soc_min_hard: 0.05              # 5% absolute floor
  soc_max_hard: 0.99
  soc_min_soft: 0.10              # Preferred operating minimum
  soc_max_soft: 0.90
  round_trip_efficiency: 0.95
  taper_start_soc: 0.90
  taper_factor: 0.5

load_profile:
  block_00_04_w: 400              # Lower overnight (no EV)
  block_04_08_w: 600
  block_08_12_w: 900
  block_12_16_w: 1000
  block_16_20_w: 1200             # Evening load (modest, battery covers)
  block_20_24_w: 800
  min_history_records: 48
  timezone: "Australia/Brisbane"

planning:
  optimiser_enabled: true
  horizon_hours: 48
  slot_duration_minutes: 30
  evaluation_interval_seconds: 300
  periodic_rebuild_interval_seconds: 3600
  forecast_delta_threshold_pct: 15.0
  soc_deviation_tolerance: 0.05
  soc_deviation_cooldown_seconds: 300
  solver_timeout_seconds: 25

battery_targets:
  evening_soc_target: 0.95        # Charge high for 6-9pm export window (earn 10c tier + credit)
  evening_target_hour: 15         # Target by 3pm (before export window opens at 4pm peak)
  morning_soc_minimum: 0.20       # Allow discharge (solar + free window refill midday)
  morning_minimum_hour: 6
  daytime_reserve_soc_target: 0.60  # Higher reserve for export capability
  daytime_reserve_start_hour: 8
  daytime_reserve_end_hour: 18
  overnight_charge_threshold_cents: 0.0
  force_charge_below_price_cents: 0.0

arbitrage:
  break_even_delta_cents: 5
  spike_threshold_cents: 100
  spike_response_mode: "aggressive"
  price_dampen_threshold_cents: 100
  price_dampen_factor: 0.5

fixed_costs:
  monthly_supply_charge_cents: 0  # Unused; TOU plan carries supply charge
  daily_access_fee_cents: 0
  hedging_per_kwh_cents: 0

anti_oscillation:
  min_command_duration_seconds: 300
  hysteresis_band: 0.05
  rate_limit_window_seconds: 900
  max_commands_per_window: 3

storm:
  enabled: true
  reserve_soc_target: 0.80
  probability_threshold: 0.70
  horizon_hours: 24

# ============================================================================
# Providers
# ============================================================================

providers:
  forecast_persistence_enabled: true
  forecast_retention_days: 365
  forecast_horizons_hours: [1.0, 4.0, 10.0, 18.0, 24.0]

  weather:
    type: "openmeteo"
    update_interval_seconds: 3600
    validity_seconds: 3600
    latitude: -27.4727            # Site B location (Jody's real coordinates)
    longitude: 152.9893

  solar:
    latitude: -27.4727
    longitude: 152.9893
    declination: 20.0              # Panel tilt
    azimuth: 0.0                   # South-facing (optimal for export)
    kwp: 10.0                       # 10 kW PV system (larger for export focus)
    timezone: "Australia/Brisbane"
    update_interval_seconds: 21600  # 6 hours
    calibration_enabled: false
    calibration_window_days: 21
    calibration_refit_interval_seconds: 3600

  storm:
    type: "bom"
    state_code: "IDQ11295"
    location_aac: "QLD_PT001"
    update_interval_seconds: 21600
    validity_seconds: 21600
    warning_product_ids:
      - IDQ21033
      - IDQ21035
      - IDQ21037
      - IDQ21038

  # ========================================================================
  # TOU Tariff Provider — ZEROHERO (TOU + VPP credits)
  # ========================================================================
  tariff:
    type: "tou"                    # Use TOU tariff (not Amber)
    timezone: "Australia/Brisbane"
    grid_charge_policy: "free_window_and_solar_only"  # No panic import

    plan:
      supply_charge_c_per_day: 198.0 # 198c/day = $1.98/day

      # Reusable band components (YAML anchors for DRY principle)
      _bands:
        peak: &peak
          descriptor: "peak"
          windows: ["16:00-22:59"]
          rate_c_per_kwh: 50.6

        off_peak_balance: &off_peak_balance
          descriptor: "off-peak-balance"
          windows: ["11:00-13:59"]
          rate_c_per_kwh: 27.5

        shoulder: &shoulder
          descriptor: "shoulder"
          windows: []  # No windows = default/fallback band for uncovered time
          rate_c_per_kwh: 39.6

      versions:
        - valid_from: "2026-06-12"
          valid_until: null          # Open-ended until next version

          # Import bands — evaluated in order; one with empty windows = default
          import_bands:
            - *peak
            - *off_peak_balance
            - *shoulder

          # Free import window — 50 kWh/day @ 0c during 11:00-13:59
          # After 50 kWh/day: falls back to off-peak-balance (27.5c)
          free_windows:
            - name: "zerocharge"
              windows: ["11:00-13:59"]
              rate_c_per_kwh: 0.0
              cap_kwh_per_day: 50.0
              applies_to_channel: "general"
              over_cap_falls_back_to: "off-peak-balance"

          # Feed-in (export) bands — tiered + base FiT
          feed_in_bands:
            # Evening premium export: 18:00-20:59 (6-9pm)
            # Volume-tiered: first 15 kWh @ 10c TOTAL (INCLUSIVE of base 2c FiT),
            # remainder @ 2c. The 10c is the TOTAL rate, not additive.
            - name: "evening-super-export"
              windows: ["18:00-20:59"]
              tiers:
                - up_to_kwh_per_day: 15.0
                  rate_c_per_kwh: 10.0  # 10c TOTAL (includes base 2c FiT)
                - up_to_kwh_per_day: null  # Open-ended (remainder of day)
                  rate_c_per_kwh: 2.0   # Base FiT rate

            # Default/fallback FiT — all other times
            - name: "default-fit"
              windows: []              # No windows = applies all other times
              rate_c_per_kwh: 0.0      # 0c/kWh daytime and other times (solar has no value except evening)

          # Conditional daily credits
          credits:
            # ZEROHERO evening low-import credit: +$1/day if 6-9pm import <= 0.03 kWh/hr
            # Earn by keeping 18:00-20:59 grid import near zero (battery covers load).
            # Soft enforcement: penalty on breach, not hard constraint; solver balances
            # credit vs peak export revenue in the same window.
            - name: "zerohero-evening"
              type: "low_import_window"
              windows: ["18:00-20:59"]
              max_import_kwh_per_hour: 0.03  # Threshold: <= 0.03 kWh/hr to earn credit
              reward_dollars_per_day: 1.00   # +$1/day when threshold is met
              enforcement: "soft"            # Soft: penalty on breach, not constraint
              credit_priority_weight: 0.5    # 50/50: balance credit vs evening export revenue

          # Note: Critical Peak Export ($1/kWh) and Critical Peak Import (5c/kWh)
          # are event-driven, discretionary credits modelled later via VPP seam (Phase 2+).

      billing_cycle:
        length_days: 28              # Monthly (use 28 for consistency; real billing is calendar month)
        anchor_date: "2026-06-12"    # Plan effective date

      vpp:
        enabled: false               # PowerMaster keeps full control (not enrolling battery dispatch to Globird)
                                     # Future: this flag gates the VPP event seam when enrolment happens (Phase 2+)

# ============================================================================
# Hardware & Loads
# ============================================================================

hardware:
  adapter: "foxess"
  foxess:
    connection_type: "tcp"
    host: "192.168.1.100"
    port: 502
    unit_id: 247
    poll_interval_seconds: 15
    watchdog_timeout_seconds: 3600
    remote_refresh_interval_seconds: 20

loads:
  shelly_devices:
    - name: "Pool Pump"
      host: "10.0.1.191"
      relay_id: 0
      power_w: 1500
      priority_class: 5
      enabled: true
      earliest_start: "08:00"
      latest_end: "16:00"
      duration_minutes: 120
      prefer_solar: true
      days_of_week: [0, 1, 2, 3, 4, 5, 6]
      min_runtime_minutes: 180
      ideal_runtime_minutes: 240
      max_runtime_minutes: 300
      allow_split_shifts: true
      completion_deadline: "16:00"

  mqtt_load_endpoints: []

# ============================================================================
# Network & Control
# ============================================================================

mqtt:
  enabled: true
  broker_host: "localhost"
  broker_port: 1883
  username: ""
  password: ""
  topic_prefix: "power_master"
  publish_interval_seconds: 5
  ha_discovery_enabled: true
  ha_discovery_prefix: "homeassistant"

dashboard:
  host: "0.0.0.0"
  port: 8080
  sse_interval_seconds: 5
  rolling_chart_power_max_kw: 20.0
  rolling_chart_window_hours: 12
  auth:
    users: []                         # Empty = auth disabled
    session_secret: ""
    session_max_age_seconds: 2592000  # 30 days

# ============================================================================
# Monitoring & Resilience
# ============================================================================

resilience:
  health_check_interval_seconds: 60
  max_consecutive_failures: 3
  stale_forecast_max_age_seconds: 7200
  degraded_safety_margin: 0.05
  stale_telemetry_max_age_seconds: 120

accounting:
  billing_cycle_day: 1
  currency_code: "AUD"

notifications:
  enabled: false
  battery_low_threshold: 0.10
  battery_full_threshold: 0.95
  log_min_level: "CRITICAL"
  daily_briefing_enabled: false
  daily_briefing_hour_local: 7
  notification_retention_days: 90
  channels:
    telegram:
      enabled: false
    email:
      enabled: false
    pushover:
      enabled: false
    ntfy:
      enabled: false
    webhook:
      enabled: false

logging:
  level: "INFO"
  format: "json"
  file: ""

db:
  path: "power_master.db"

# ============================================================================
# Strategy Notes
# ============================================================================
# ZEROHERO key optimization strategies:
#
# 1. Midday solar: store in battery (0c FiT daytime), do NOT export it.
#    Discharge in 6-9pm peak to:
#    a) Earn 10c/kWh tier (first 15 kWh), then 2c for remainder.
#    b) Keep grid import near 0 to earn $1/day ZEROHERO credit.
#
# 2. Evening window (18:00-20:59) is a tension:
#    - Export at 10c TOTAL (first 15 kWh) earns ~$1.50/day × 365 days.
#    - Low-import credit earns $1/day × 365 days.
#    - Both require battery discharge in the same window.
#    - Solver balances via credit_priority_weight (0.5 = equal trade-off).
#
# 3. Battery targets:
#    - Evening target 95% SOC by 3pm: builds capacity for evening export.
#    - Charge from free window 11am-2pm + solar.
#    - Discharge 6-9pm for export + load coverage.
#
# 4. Import cap (15kW):
#    - Free-window orchestration (Phase 2) must respect this when
#      charging battery + other loads concurrently.
#
# 5. Critical Peak events (future, Phase 2+):
#    - $1/kWh export, 5c/kWh import credits are event-driven, discretionary.
#    - Seeded in VPP hook, not active until enrolment.
